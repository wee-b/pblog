spring:
  tomcat:
    threads:
      max: 200  # 限制线程数，降低CPU消耗
    connection-timeout: 20000  # 缩短连接超时，释放资源
  profiles:
    active: dev

  datasource:
    url: jdbc:p6spy:mysql://${bin.datasource.host}:${bin.datasource.port}/${bin.datasource.database}?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${bin.datasource.username}
    password: ${bin.datasource.password}
    driver-class-name: ${bin.datasource.driver-class-name}

  # Redis 配置
  data:
    redis:
      host: ${bin.redis.host}
      port: ${bin.redis.port}
      database: ${bin.redis.database}
      password: ${bin.redis.password}


  # 邮箱登录
  mail:
    host: smtp.qq.com  # QQ邮箱SMTP服务器（固定）
    port: 465  # SSL加密专用端口（必须为465，不能用587）
    username: ${bin.mail.username}
    password: ${bin.mail.password}
    properties:
      mail:
        smtp:
          ssl:
            enable: true  # 启用SSL加密（关键）
          socketFactoryClass: javax.net.ssl.SSLSocketFactory  # SSL工厂类（配合465端口）
          socketFactory.port: 465  # 明确指定SSL工厂端口（避免端口混乱）
    default-encoding: UTF-8

  # 文件上传设置
  servlet:
    multipart:
      max-file-size: 10MB  # 单个文件大小限制
      max-request-size: 10MB  # 单次请求文件总大小限制

aliyun:
  oss:
    endpoint: ${bin.aliyun.oss.endpoint}
    access-key-id: ${bin.aliyun.oss.access-key-id}
    access-key-secret: ${bin.aliyun.oss.access-key-secret}
    bucket-name: ${bin.aliyun.oss.bucket-name}
    url-expire-minutes: 30  # 签名URL有效期（分钟）


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml  # Mapper.xml 文件路径
  type-aliases-package: com.pblog.common.entity  # 实体类包路径
  configuration:
    # 关闭 MyBatis 原生控制台日志（关键）
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl # 日志
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto






# 自定义部分

login:
  time:
    key: 10000000

like:
  delay:
    minutes: 3  # 点赞同步延迟时间（分钟）